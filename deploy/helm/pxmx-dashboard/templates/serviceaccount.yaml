apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pxmx-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pxmx-dashboard.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pxmx-clusters · Dashboard</title>
  <meta name="gh-repo" content="{{ repo }}">
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-2:   #1c2128;
      --border:      #30363d;
      --border-hover:#484f57;
      --text:        #e6edf3;
      --muted:       #7d8590;
      --blue:        #388bfd;
      --blue-dim:    #1a3a6e;
      --green:       #3fb950;
      --green-dim:   #1a4429;
      --red:         #f85149;
      --red-dim:     #4a1919;
      --yellow:      #d29922;
      --yellow-dim:  #3d2d00;
      --orange:      #e3820b;
      --orange-dim:  #3a2200;
      --radius:      10px;
      --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      font-size: 1.3rem;
      line-height: 1;
    }
    .header-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .header-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .repo-link {
      color: var(--blue);
      font-size: 0.82rem;
      text-decoration: none;
      opacity: .8;
    }
    .repo-link:hover { opacity: 1; text-decoration: underline; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface-2);
    }
    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }
    .pulse-dot.active { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .cluster-count {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2em;
      padding: 1px 8px;
      font-size: 0.75rem;
    }

    /* ── Main grid ── */
    main { padding: 20px 24px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .empty-state code {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .error-banner {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.83rem;
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 13px;
      transition: border-color .15s, box-shadow .15s;
      border-left-width: 3px;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    /* Left accent strip by state */
    .card.state-in_progress { border-left-color: var(--blue); }
    .card.state-queued      { border-left-color: var(--yellow); }
    .card.state-success     { border-left-color: var(--green); }
    .card.state-failure     { border-left-color: var(--red); }
    .card.state-cancelled   { border-left-color: var(--muted); }

    /* ── Destroy card overrides ── */
    /* Slightly warmer background to distinguish from apply cards */
    .card.wf-destroy {
      background: #1a1613;
    }
    /* Orange replaces blue/yellow as the active-state accent */
    .card.wf-destroy.state-in_progress { border-left-color: var(--orange); }
    .card.wf-destroy.state-queued      { border-left-color: var(--orange); }
    /* Distinct wf-pill colour */
    .card.wf-destroy .wf-pill {
      color: var(--orange);
      border-color: var(--orange-dim);
      background: var(--orange-dim);
    }
    /* Orange running / queued badge */
    .card.wf-destroy .badge-running,
    .card.wf-destroy .badge-queued {
      background: var(--orange-dim);
      color: var(--orange);
    }
    /* Orange shimmer progress bar */
    .card.wf-destroy .fill-running {
      background: linear-gradient(90deg, #8a4800 0%, var(--orange) 50%, #ffa040 100%);
      background-size: 300% 100%;
    }
    /* Orange pct label while running / queued */
    .card.wf-destroy .pct-running,
    .card.wf-destroy .pct-queued { color: var(--orange); }

    /* ── Card header ── */
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.01em;
      word-break: break-all;
    }
    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Status badge ── */
    .badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 2em;
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .badge-running   { background: var(--blue-dim);   color: var(--blue);   }
    .badge-queued    { background: var(--yellow-dim);  color: var(--yellow); }
    .badge-success   { background: var(--green-dim);   color: var(--green);  }
    .badge-failure   { background: var(--red-dim);     color: var(--red);    }
    .badge-cancelled { background: #22262d; color: var(--muted); }

    /* ── Progress bar ── */
    .progress-section { display: flex; flex-direction: column; gap: 6px; }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      font-size: 0.77rem;
      color: var(--muted);
    }
    .step-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 80%;
    }
    .pct-label {
      flex-shrink: 0;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    /* Colour pct label by state */
    .pct-running  { color: var(--blue);   }
    .pct-success  { color: var(--green);  }
    .pct-failure  { color: var(--red);    }
    .pct-queued   { color: var(--yellow); }

    .track {
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      border-radius: 4px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
      will-change: width;
    }
    .fill-running {
      background: linear-gradient(90deg, #1158d4 0%, var(--blue) 50%, #79c0ff 100%);
      background-size: 300% 100%;
      animation: shimmer 2s linear infinite;
    }
    .fill-success  { background: var(--green); }
    .fill-failure  { background: var(--red);   }
    .fill-queued   { background: var(--yellow); }
    .fill-cancelled{ background: var(--muted); }

    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ── Card footer ── */
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.76rem;
      color: var(--muted);
      gap: 8px;
    }
    .foot-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .wf-pill {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }
    .duration { white-space: nowrap; }

    .run-link {
      color: var(--blue);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .run-link:hover { text-decoration: underline; }

    /* ── Destroy button ── */
    .btn-destroy {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid var(--red);
      background: transparent;
      color: var(--red);
      cursor: pointer;
      letter-spacing: .03em;
      transition: background .15s, color .15s;
    }
    .btn-destroy:hover  { background: var(--red-dim); }
    .btn-destroy:active { opacity: .75; }

    /* ── Confirmation modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: min(420px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--red);
    }
    .modal-body {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .modal-body strong { color: var(--text); }
    .modal-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.88rem;
      padding: 7px 10px;
      outline: none;
    }
    .modal-input:focus { border-color: var(--red); }
    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-cancel {
      padding: 6px 16px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--border-hover); }
    .btn-confirm-destroy {
      padding: 6px 16px;
      border-radius: 5px;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-confirm-destroy:disabled { opacity: .35; cursor: not-allowed; }
    .btn-confirm-destroy:not(:disabled):hover { opacity: .85; }
  </style>
</head>

<body>

  <header>
    <div class="header-left">
      <span class="header-logo">🖥</span>
      <div>
        <div class="header-title">pxmx-clusters — Dashboard</div>
        <div class="header-subtitle">Proxmox GitOps · Terraform automation</div>
      </div>
    </div>
    <div class="header-right">
      <a class="repo-link" id="repo-link" href="#" target="_blank" rel="noopener"></a>
    </div>
  </header>

  <div class="toolbar">
    <span id="pulse-dot" class="pulse-dot"></span>
    <span id="status-text">Connecting…</span>
    <span class="cluster-count" id="cluster-count" style="display:none"></span>
  </div>

  <main>
    <div id="error-banner" class="error-banner" style="display:none">
      <span>⚠</span>
      <span id="error-text"></span>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- Destroy confirmation modal -->
  <div class="modal-overlay" id="destroy-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-title" id="modal-title">&#9888; Confirm Cluster Destruction</div>
      <div class="modal-body">
        This will trigger <strong>terraform destroy</strong> for cluster
        <strong id="modal-cluster-label"></strong>. All VMs in this cluster will be
        permanently deleted from Proxmox.<br><br>
        Type the cluster name to confirm:
      </div>
      <input class="modal-input" id="modal-confirm-input" type="text"
             autocomplete="off" spellcheck="false"
             placeholder="cluster name" />
      <div class="modal-foot">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-confirm-destroy" id="modal-confirm-btn" disabled>Destroy</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    const POLL_MS      = 10_000;   // refresh every 10 s
    const REPO_NAME    = document.querySelector('meta[name="gh-repo"]').content;

    const $grid        = document.getElementById('grid');
    const $error       = document.getElementById('error-banner');
    const $errorText   = document.getElementById('error-text');
    const $statusText  = document.getElementById('status-text');
    const $pulseDot    = document.getElementById('pulse-dot');
    const $count       = document.getElementById('cluster-count');
    const $repoLink    = document.getElementById('repo-link');

    if (REPO_NAME) {
      $repoLink.href        = `https://github.com/${REPO_NAME}`;
      $repoLink.textContent = REPO_NAME;
    }

    // ── HTML escaping ──────────────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── State helpers ──────────────────────────────────────────────────────
    function cardState(status, conclusion) {
      if (status === 'in_progress') return 'in_progress';
      if (status === 'queued')      return 'queued';
      if (conclusion === 'success') return 'success';
      if (conclusion === 'failure' || conclusion === 'timed_out') return 'failure';
      return 'cancelled';
    }

    function badgeClass(state) {
      return {
        in_progress: 'badge-running',
        queued:      'badge-queued',
        success:     'badge-success',
        failure:     'badge-failure',
        cancelled:   'badge-cancelled',
      }[state] ?? 'badge-cancelled';
    }

    function badgeLabel(state) {
      return {
        in_progress: 'Running',
        queued:      'Queued',
        success:     'Success',
        failure:     'Failed',
        cancelled:   'Cancelled',
      }[state] ?? state;
    }

    function fillClass(state) {
      return {
        in_progress: 'fill-running',
        queued:      'fill-queued',
        success:     'fill-success',
        failure:     'fill-failure',
        cancelled:   'fill-cancelled',
      }[state] ?? 'fill-cancelled';
    }

    function pctClass(state) {
      return {
        in_progress: 'pct-running',
        queued:      'pct-queued',
        success:     'pct-success',
        failure:     'pct-failure',
      }[state] ?? '';
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    // ── Card renderer ──────────────────────────────────────────────────────
    function renderCard(c) {
      const state = cardState(c.status, c.conclusion);
      const pct   = Math.min(100, Math.max(0, c.percent ?? 0));
      const badge = badgeClass(state);
      const fill  = fillClass(state);
      const pCls  = pctClass(state);
      const showDestroy = c.workflow === 'apply' && state === 'success';

      return `
        <div class="card state-${esc(state)} wf-${esc(c.workflow)}">

          <div class="card-head">
            <div>
              <div class="card-name">${esc(c.cluster)}</div>
              <div class="card-meta">${esc(fmtDate(c.created_at))}</div>
            </div>
            <span class="badge ${esc(badge)}">${esc(badgeLabel(state))}</span>
          </div>

          <div class="progress-section">
            <div class="progress-labels">
              <span class="step-name" title="${esc(c.current_step)}">${esc(c.current_step)}</span>
              <span class="pct-label ${esc(pCls)}">${pct}%</span>
            </div>
            <div class="track">
              <div class="fill ${esc(fill)}" style="width:${pct}%"></div>
            </div>
          </div>

          <div class="card-foot">
            <div class="foot-left">
              <span class="wf-pill">${esc(c.workflow)}</span>
              ${c.duration ? `<span class="duration">&#9201; ${esc(c.duration)}</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              ${showDestroy ? `<button class="btn-destroy" data-cluster="${esc(c.cluster)}" onclick="confirmDestroy(this.dataset.cluster)">Destroy</button>` : ''}
              <a class="run-link" href="${esc(c.run_url)}" target="_blank" rel="noopener">
                View run &#8594;
              </a>
            </div>
          </div>

        </div>`;
    }

    // ── Fetch & render ─────────────────────────────────────────────────────
    async function refresh() {
      $pulseDot.classList.add('active');
      $statusText.textContent = 'Refreshing…';

      try {
        const resp = await fetch('/api/clusters');
        const data = await resp.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        hideError();

        if (data.length === 0) {
          $grid.innerHTML = `
            <div class="empty-state">
              No recent cluster runs found.<br>
              Push a change to <code>clusters/*.yaml</code> to trigger a run.
            </div>`;
          $count.style.display = 'none';
        } else {
          $grid.innerHTML = data.map(renderCard).join('');
          $count.textContent = `${data.length} cluster${data.length !== 1 ? 's' : ''}`;
          $count.style.display = '';
        }

        $statusText.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        showError(`Could not reach server — ${err.message}`);
      } finally {
        $pulseDot.classList.remove('active');
      }
    }

    function showError(msg) {
      $errorText.textContent = msg;
      $error.style.display = 'flex';
      $statusText.textContent = 'Error — retrying…';
    }

    function hideError() {
      $error.style.display = 'none';
    }

    // ── Destroy modal ──────────────────────────────────────────────────────
    const $modal        = document.getElementById('destroy-modal');
    const $modalLabel   = document.getElementById('modal-cluster-label');
    const $modalInput   = document.getElementById('modal-confirm-input');
    const $modalConfirm = document.getElementById('modal-confirm-btn');
    const $modalCancel  = document.getElementById('modal-cancel');

    let _pendingCluster = null;

    function confirmDestroy(cluster) {
      _pendingCluster            = cluster;
      $modalLabel.textContent    = cluster;
      $modalInput.value          = '';
      $modalConfirm.disabled     = true;
      $modalConfirm.textContent  = 'Destroy';
      $modal.classList.add('open');
      $modalInput.focus();
    }

    function closeModal() {
      $modal.classList.remove('open');
      _pendingCluster = null;
    }

    $modalInput.addEventListener('input', () => {
      $modalConfirm.disabled = ($modalInput.value !== _pendingCluster);
    });

    $modalCancel.addEventListener('click', closeModal);

    // Close on backdrop click
    $modal.addEventListener('click', e => { if (e.target === $modal) closeModal(); });

    // Close on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    $modalConfirm.addEventListener('click', async () => {
      const cluster = _pendingCluster;
      if (!cluster || $modalInput.value !== cluster) return;

      $modalConfirm.disabled        = true;
      $modalConfirm.textContent     = 'Triggering\u2026';

      try {
        const resp = await fetch(`/api/destroy/${encodeURIComponent(cluster)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const data = await resp.json();

        if (data.ok) {
          closeModal();
          // Give GitHub a moment, then refresh to pick up the new queued run
          setTimeout(refresh, 3000);
        } else {
          $modalConfirm.textContent = 'Destroy';
          $modalConfirm.disabled    = false;
          showError(`Destroy failed: ${data.error ?? 'unknown error'}`);
          closeModal();
        }
      } catch (err) {
        $modalConfirm.textContent = 'Destroy';
        $modalConfirm.disabled    = false;
        showError(`Request failed: ${err.message}`);
        closeModal();
      }
    });

    // Initial load + polling
    refresh();
    setInterval(refresh, POLL_MS);
  </script>

</body>
</html>

{{- if not .Values.github.existingSecret }}
{{- if not .Values.github.token }}
{{- fail "Either github.token or github.existingSecret must be set." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pxmx-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pxmx-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  github-token: {{ .Values.github.token | quote }}
{{- end }}

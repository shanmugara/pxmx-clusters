name: Cluster Destroy

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "Cluster name (must match clusters/<name>.yaml)"
        required: true
        type: string
      confirm:
        description: "Type the cluster name again to confirm destruction"
        required: true
        type: string

jobs:
  destroy:
    name: terraform (${{ github.event.inputs.cluster }})
    runs-on: [self-hosted, proxmox]
    if: github.event.inputs.cluster == github.event.inputs.confirm
    permissions:
      contents: write   # needed to push the manifest removal commit

    steps:
      - uses: actions/checkout@v4

      - name: Set HOME for self-hosted runner
        run: echo "HOME=$RUNNER_TEMP" >> $GITHUB_ENV

      - name: Validate cluster manifest exists
        run: |
          if [ ! -f "clusters/${{ github.event.inputs.cluster }}.yaml" ]; then
            echo "ERROR: clusters/${{ github.event.inputs.cluster }}.yaml not found"
            exit 1
          fi

      - name: Generate tfvars from cluster manifest
        run: |
          python3 scripts/yaml_to_tfvars.py \
            clusters/${{ github.event.inputs.cluster }}.yaml \
            terraform/generated.auto.tfvars

      - name: Configure git credentials for Terraform modules
        run: |
          git config --global url."https://oauth2:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=clusters/${{ github.event.inputs.cluster }}/terraform.tfstate" \
            -backend-config="endpoint=${{ secrets.MINIO_ENDPOINT }}" \
            -backend-config="access_key=${{ secrets.MINIO_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.MINIO_SECRET_KEY }}" \
            -backend-config="region=us-east-1" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="force_path_style=true" \
            -reconfigure
        env:
          TF_VAR_pm_api_url: ${{ secrets.PM_API_URL }}

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve
        env:
          TF_VAR_pm_api_url: ${{ secrets.PM_API_URL }}
          TF_VAR_pm_user: ${{ secrets.PM_USER }}
          TF_VAR_pm_password: ${{ secrets.PM_PASSWORD }}
          TF_VAR_ci_password: ${{ secrets.CI_PASSWORD }}
          TF_VAR_dns_key_secret: ${{ secrets.DNS_KEY_SECRET }}
          TF_VAR_ci_sshkeys: ${{ secrets.CI_SSHKEYS }}

      - name: Archive cluster manifest after destroy
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          mkdir -p destroyed
          # Ensure both folders always have a .gitkeep so they are never dropped
          # from the repository even when empty.
          touch clusters/.gitkeep destroyed/.gitkeep
          git add clusters/.gitkeep destroyed/.gitkeep
          git mv clusters/${{ github.event.inputs.cluster }}.yaml destroyed/${{ github.event.inputs.cluster }}.yaml
          # If clusters/ is now empty (no remaining *.yaml), the .gitkeep above
          # is all that remains — it was already staged, nothing more to do.
          remaining=$(find clusters -maxdepth 1 -name '*.yaml' | wc -l)
          if [ "$remaining" -gt 0 ]; then
            # Still has manifests; unstage the .gitkeep we just added (not needed)
            git restore --staged clusters/.gitkeep || true
            rm -f clusters/.gitkeep
          fi
          git commit -m "chore: archive destroyed cluster ${{ github.event.inputs.cluster }}"
          git push

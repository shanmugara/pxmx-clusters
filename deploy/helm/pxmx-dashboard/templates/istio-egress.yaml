{{- if .Values.istio.enabled }}
# ServiceEntry registers api.github.com in Istio's service registry.
# Protocol TLS (not HTTPS) tells Envoy to route by SNI and leave the TLS
# payload untouched — Python's requests library handles the TLS handshake
# end-to-end.  Using HTTPS + DestinationRule SIMPLE causes double-TLS and
# results in [SSL] record layer failure errors.
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: {{ include "pxmx-dashboard.fullname" . }}-github-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pxmx-dashboard.labels" . | nindent 4 }}
spec:
  hosts:
    - api.github.com
  ports:
    - number: 443
      name: tls
      protocol: TLS
  resolution: DNS
  location: MESH_EXTERNAL
{{- end }}

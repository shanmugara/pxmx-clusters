apiVersion: v1
kind: Cluster
metadata:
  name: app1-cluster
  description: "App1 test cluster iter4"
spec:
  # VM naming: nodes will be named <node_prefix>-1, <node_prefix>-2, etc.
  node_prefix: app1
  node_count: 2

  # Proxmox settings
  target_node: omegakvm002
  template: ubuntu-24.04-template
  bridge: vmbr0

  # VM resources
  cores: 2
  memory: 4096
  disk_size: "20G"

  # DNS settings
  dns_zone: "omegaworld.net."
  dns_ttl: 300

  # Kea DHCP settings (optional)
  # kea_subnet_id: 2
  # kea_dhcp_url: "http://omegart01.omegaworld.net:5000/ap1/v1"

  # Misc
  force_reboot: true

# ── Secret: GitHub token ───────────────────────────────────────────────────────
# DO NOT commit a populated version of this file.
# Create the secret once with:
#   kubectl create secret generic dashboard-secret \
#     --namespace pxmx-dashboard \
#     --from-literal=github-token=github_pat_XXXX \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The placeholder below is intentionally empty so this file is safe to store
# in version control as documentation.
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-secret
  namespace: pxmx-dashboard
  labels:
    app.kubernetes.io/name: pxmx-dashboard
type: Opaque
stringData:
  github-token: ""   # <-- fill in at deploy time (see comment above)

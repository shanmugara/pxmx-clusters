apiVersion: apps/v1
kind: Deployment
metadata:
  name: pxmx-dashboard
  namespace: pxmx-dashboard
  labels:
    app.kubernetes.io/name: pxmx-dashboard
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pxmx-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pxmx-dashboard
        app.kubernetes.io/component: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: dashboard
          # Replace with your registry / image digest for immutable deploys:
          #   ghcr.io/<owner>/pxmx-dashboard@sha256:<digest>
          image: shanmugara/pxmx-dashboard:v0.0.1
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5001
              protocol: TCP

          envFrom:
            - configMapRef:
                name: dashboard-config

          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dashboard-secret
                  key: github-token

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
